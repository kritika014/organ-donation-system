<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organ Donation Matching System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Organ Donation Matching System</h1>
        <p class="subtitle">Beginner-friendly project with MySQL + Flask + Matching Logic</p>

        {% if request.args.get('msg') %}
            <div class="alert success">{{ request.args.get('msg') }}</div>
        {% endif %}
        {% if error %}
            <div class="alert error">{{ error }}</div>
        {% endif %}

        <div class="grid">
            <div class="card">
                <h2>Add Donor</h2>
                <form action="/add_donor" method="POST">
                    <label>Name</label>
                    <input type="text" name="name" required>

                    <label>Age</label>
                    <input type="number" name="age" min="18" max="100" required>

                    <label>Blood Group</label>
                    <select name="blood" required>
                        <option value="">Select</option>
                        <option>O-</option><option>O+</option><option>A-</option><option>A+</option>
                        <option>B-</option><option>B+</option><option>AB-</option><option>AB+</option>
                    </select>

                    <label>Organ</label>
                    <select name="organ" required>
                        <option value="">Select</option>
                        <option>Kidney</option><option>Liver</option><option>Heart</option>
                        <option>Lung</option><option>Pancreas</option>
                    </select>

                    <label>City</label>
                    <input type="text" name="city" required>

                    <label>Contact</label>
                    <input type="text" name="contact">

                    <button type="submit">Save Donor</button>
                </form>
            </div>

            <div class="card">
                <h2>Add Recipient</h2>
                <form action="/add_recipient" method="POST">
                    <label>Name</label>
                    <input type="text" name="name" required>

                    <label>Age</label>
                    <input type="number" name="age" min="1" max="100" required>

                    <label>Blood Group</label>
                    <select name="blood" required>
                        <option value="">Select</option>
                        <option>O-</option><option>O+</option><option>A-</option><option>A+</option>
                        <option>B-</option><option>B+</option><option>AB-</option><option>AB+</option>
                    </select>

                    <label>Organ Needed</label>
                    <select name="organ_needed" required>
                        <option value="">Select</option>
                        <option>Kidney</option><option>Liver</option><option>Heart</option>
                        <option>Lung</option><option>Pancreas</option>
                    </select>

                    <label>City</label>
                    <input type="text" name="city" required>

                    <label>Urgency Level (1-5)</label>
                    <input type="number" name="urgency_level" min="1" max="5" required>

                    <button type="submit">Save Recipient</button>
                </form>
            </div>
        </div>

        <div class="actions">
            <a class="btn" href="/matches">View Matching Results</a>
            <a class="btn secondary" href="/view_matches">View Matches (JSON API)</a>
        </div>
    </div>
</body>
</html>
